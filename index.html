<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Authorize</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="header">
            <h2>Konfirmasi Password POS</h2>
            <p>Silakan masukkan 6 digit authorize password POS untuk memproses request ini.</p>
        </div>

        <div class="form-group">
            <label for="paramId">ID Request</label>
            <input type="text" id="paramId" disabled placeholder="Memuat ID..." readonly>
        </div>

        <div class="form-group">
            <label for="paramName">Nama Request</label>
            <input type="text" id="paramName" disabled placeholder="Memuat Nama..." readonly>
        </div>

        <div class="form-group">
            <label>Password Authorize POS</label>
            <div class="otp-container">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
            </div>
        </div>

        <button id="btnConfirm" class="btn-confirm">Confirm Share Password</button>

        <div id="statusMsg" class="status-message"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
